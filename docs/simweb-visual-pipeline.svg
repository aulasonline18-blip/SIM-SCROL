<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#ffffff"/>
  <style>
    .title { font: 700 34px Arial, sans-serif; fill: #111827; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 3; rx: 16; }
    .green { fill: #ecfdf5; stroke: #047857; }
    .blue { fill: #eff6ff; stroke: #2563eb; }
    .yellow { fill: #fffbeb; stroke: #b45309; }
    .red { fill: #fef2f2; stroke: #dc2626; }
    .txt { font: 700 24px Arial, sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
    .small { font: 500 18px Arial, sans-serif; fill: #374151; text-anchor: middle; dominant-baseline: middle; }
    .arrow { stroke: #111827; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    .label { font: 700 18px Arial, sans-serif; fill: #111827; text-anchor: middle; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#111827"/>
    </marker>
  </defs>

  <text x="600" y="55" class="title" text-anchor="middle">Pipeline Visual do SIMWeb</text>

  <rect x="70" y="120" width="170" height="80" class="box blue"/>
  <text x="155" y="152" class="txt">T02</text>
  <text x="155" y="180" class="small">professor</text>

  <rect x="350" y="120" width="170" height="80" class="box yellow"/>
  <text x="435" y="152" class="txt">S12</text>
  <text x="435" y="180" class="small">organizador</text>

  <path d="M240 160 H350" class="arrow"/>

  <rect x="720" y="85" width="230" height="70" class="box green"/>
  <text x="835" y="112" class="txt">SVG pronto</text>
  <text x="835" y="138" class="small">mostra direto</text>

  <rect x="720" y="200" width="230" height="78" class="box green"/>
  <text x="835" y="228" class="txt">math_template</text>
  <text x="835" y="255" class="small">software desenha</text>

  <rect x="720" y="335" width="230" height="80" class="box yellow"/>
  <text x="835" y="367" class="txt">N2</text>
  <text x="835" y="394" class="small">analisador barato</text>

  <path d="M520 145 C610 115 625 120 720 120" class="arrow"/>
  <text x="625" y="100" class="label">se ja veio desenho</text>

  <path d="M520 170 C610 205 625 238 720 238" class="arrow"/>
  <text x="625" y="226" class="label">se veio template</text>

  <path d="M520 195 C610 290 625 375 720 375" class="arrow"/>
  <text x="625" y="330" class="label">se veio descricao</text>

  <rect x="390" y="510" width="230" height="80" class="box red"/>
  <text x="505" y="542" class="txt">AI paga</text>
  <text x="505" y="570" class="small">imagem realista</text>

  <rect x="720" y="510" width="230" height="80" class="box yellow"/>
  <text x="835" y="542" class="txt">N3</text>
  <text x="835" y="570" class="small">desenhista SVG</text>

  <path d="M780 415 C690 470 615 510 620 540" class="arrow"/>
  <text x="625" y="495" class="label">se for AI paga</text>

  <path d="M835 415 V510" class="arrow"/>
  <text x="905" y="470" class="label">se for SVG ou duvida</text>

  <rect x="1010" y="510" width="140" height="80" class="box green"/>
  <text x="1080" y="542" class="txt">SVG</text>
  <text x="1080" y="570" class="small">entregue</text>

  <path d="M950 550 H1010" class="arrow"/>

  <path d="M760 590 C675 660 560 650 520 590" class="arrow"/>
  <text x="650" y="680" class="label">ou confirma AI paga</text>

  <text x="600" y="725" class="small">Resumo: T02 -> S12 -> SVG pronto / math_template / N2 -> N3 ou AI paga</text>
</svg>
